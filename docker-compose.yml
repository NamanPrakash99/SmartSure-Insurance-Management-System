# version: '3.8' (obsolete)

services:
  # ==========================================
  # 1. INFRASTRUCTURE (Databases & Brokers)
  # ==========================================
  postgres-db:
    image: postgres:alpine
    container_name: postgres-db
    restart: always
    networks:
      - smartsure-network
    environment:
      - POSTGRES_DB=SmartSure
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=2580
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SmartSure"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    networks:
      - smartsure-network
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    networks:
      - smartsure-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # ==========================================
  # 2. CORE BACKEND SERVICES (Control Plane)
  # ==========================================
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    image: smartsure-eureka-server
    container_name: eureka-server
    restart: always
    networks:
      - smartsure-network
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    image: smartsure-config-server
    container_name: config-server
    restart: always
    networks:
      - smartsure-network
    ports:
      - "9999:9999"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
    depends_on:
      - eureka-server

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: smartsure-api-gateway
    container_name: api-gateway
    restart: always
    networks:
      - smartsure-network
    ports:
      - "8888:8888"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9999
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_CONFIG_CLIENT_CONFIGSERVERCONFIGDATALOADER=ERROR
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
    depends_on:
      - config-server
      - eureka-server

  # ==========================================
  # 3. APPLICATION MICROSERVICES
  # ==========================================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: smartsure-auth-service
    container_name: auth-service
    restart: always
    networks:
      - smartsure-network
    environment: &common-env
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9999
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/SmartSure
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
    depends_on:
      - postgres-db
      - rabbitmq
      - config-server
      - eureka-server

  policy-service:
    build:
      context: .
      dockerfile: policy-service/Dockerfile
    image: smartsure-policy-service
    container_name: policy-service
    restart: always
    networks:
      - smartsure-network
    environment: *common-env
    depends_on:
      - postgres-db
      - redis
      - config-server

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: smartsure-payment-service
    container_name: payment-service
    restart: always
    networks:
      - smartsure-network
    environment: *common-env
    depends_on:
      - postgres-db
      - rabbitmq
      - config-server

  claims-service:
    build:
      context: .
      dockerfile: claims-service/Dockerfile
    image: smartsure-claims-service
    container_name: claims-service
    restart: always
    networks:
      - smartsure-network
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9999
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/SmartSure
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
    depends_on:
      - postgres-db
      - rabbitmq
      - config-server
      - eureka-server

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    image: smartsure-admin-service
    container_name: admin-service
    restart: always
    networks:
      - smartsure-network
    environment: *common-env
    ports:
      - "8005:8005"
    depends_on:
      - postgres-db
      - config-server
      - eureka-server


  # ==========================================
  # 4. OBSERVABILITY (ELK & Zipkin)
  # ==========================================
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: always
    networks:
      - smartsure-network
    ports:
      - "9411:9411"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: elasticsearch
    restart: always
    networks:
      - smartsure-network
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: logstash
    restart: always
    networks:
      - smartsure-network
    volumes:
      - ./observability/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: kibana
    restart: always
    networks:
      - smartsure-network
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  # ==========================================
  # 5. MONITORING (Prometheus & Grafana)
  # ==========================================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    networks:
      - smartsure-network
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    networks:
      - smartsure-network
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # ==========================================
  # 6. FRONTEND
  # ==========================================
  smartsure-frontend:
    build:
      context: ./smartsure-frontend
      dockerfile: Dockerfile
    image: smartsure-frontend
    container_name: smartsure-frontend
    restart: always
    networks:
      - smartsure-network
    ports:
      - "80:80"
    depends_on:
      - api-gateway

networks:
  smartsure-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
